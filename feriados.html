<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feriados Nacionais - Minha Rua</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js" defer></script>
    <script src="js/sidebar.js" defer></script>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="ph ph-map-pin"></i>
          <span>Minha Rua</span>
        </div>
        <button class="sidebar-close" id="close-sidebar"><i class="ph ph-x"></i></button>
      </div>
            <nav class="sidebar-nav">
        <label class="nav-label">Consultas</label>
        <a href="index.html" class="nav-item"><i class="ph ph-map-pin-line"></i> Busca CEP</a>
        <a href="cnpj.html" class="nav-item"><i class="ph ph-buildings"></i> Busca CNPJ</a>
        <a href="ddd.html" class="nav-item"><i class="ph ph-phone"></i> DDD Cidades</a>
        
        <label class="nav-label">Finanças</label>
        <a href="taxas.html" class="nav-item"><i class="ph ph-trend-up"></i> Taxas (Selic)</a>
        <a href="cambio.html" class="nav-item"><i class="ph ph-currency-circle-dollar"></i> Câmbio</a>
        <a href="pix.html" class="nav-item"><i class="ph ph-qr-code"></i> Bancos PIX</a>
        <a href="bancos.html" class="nav-item"><i class="ph ph-bank"></i> Cód. Bancos</a>
        
        <label class="nav-label">Serviços</label>
        <a href="clima.html" class="nav-item"><i class="ph ph-cloud-sun"></i> Clima & Tempo</a>
        <a href="rastreio.html" class="nav-item"><i class="ph ph-package"></i> Rastreio</a>
        
        <label class="nav-label">Geral</label>
        <a href="ncm.html" class="nav-item"><i class="ph ph-barcode"></i> Busca NCM</a>
        <a href="feriados.html" class="nav-item active"><i class="ph ph-calendar-blank"></i> Feriados</a>
        <a href="dominio.html" class="nav-item"><i class="ph ph-globe"></i> Domínios BR</a>
        <a href="isbn.html" class="nav-item"><i class="ph ph-book"></i> ISBN Livros</a>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px dashed var(--input-border);">
          <label style="font-size: 11px; margin-bottom: 4px; display: block;">TEMA</label>
          <select id="theme-switcher" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 13px; cursor: pointer;">
            <option value="light">☀️ Claro (Padrão)</option>
            <option value="dark">🌙 Escuro</option>
            <option value="dracula">🧛 Dracula</option>
            <option value="neon">⚡ Neon</option>
          </select>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="mobile-header">
        <button class="mobile-toggle" id="open-sidebar"><i class="ph ph-list"></i></button>
        <span class="mobile-title">Feriados Nacionais</span>
      </header>
      
      <div class="content-wrapper">
        <main class="container">
          <header class="header">
            <div class="icon-wrapper">
              <i class="ph ph-calendar-star"></i>
            </div>
            <h1>Feriados Nacionais</h1>
            <p>Lista dos feriados nacionais oficiais do Brasil.</p>
          </header>

          <div class="inputs-grid">
            <div class="group group-main">
              <label for="ano">Ano Base</label>
              <div class="input-content">
                <i class="ph ph-calendar-blank"></i>
                <input type="number" id="ano" min="1900" max="2199" placeholder="Ex: 2024" autocomplete="off" />
              </div>
              <span id="error-msg" class="error-msg hidden">Ano inválido ou dados não encontrados.</span>
            </div>

            <!-- Loading -->
            <div style="position: relative; display: flex; justify-content: center; height: 24px; margin-top: -10px;">
              <div id="loading" class="spinner hidden" style="position: relative; right: auto;"></div>
            </div>

            <div class="results-container hidden" id="results" style="border: none; padding-top: 0;">
              <div class="dashboard-grid" id="feriados-grid">
                <!-- Cards injected here -->
              </div>
            </div>
          </div>
        </main>
      </div>
    </main>

    <script src="js/buscaferiados.js"></script>
  </body>
</html>
