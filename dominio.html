<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca Domínio - Minha Rua</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js" defer></script>
    <script src="js/sidebar.js" defer></script>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="ph ph-map-pin"></i>
          <span>Minha Rua</span>
        </div>
        <button class="sidebar-close" id="close-sidebar"><i class="ph ph-x"></i></button>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><i class="ph ph-map-pin-line"></i> Busca CEP</a>
        <a href="cnpj.html" class="nav-item"><i class="ph ph-buildings"></i> Busca CNPJ</a>
        <a href="dominio.html" class="nav-item active"><i class="ph ph-globe"></i> Domínios BR</a>
        <a href="cambio.html" class="nav-item"><i class="ph ph-currency-circle-dollar"></i> Câmbio</a>
        <a href="isbn.html" class="nav-item"><i class="ph ph-book"></i> ISBN Livros</a>
        <a href="pix.html" class="nav-item"><i class="ph ph-qr-code"></i> PIX Bancos</a>
        <a href="feriados.html" class="nav-item"><i class="ph ph-calendar-blank"></i> Feriados</a>
        <a href="bancos.html" class="nav-item"><i class="ph ph-bank"></i> Bancos</a>
        <a href="ddd.html" class="nav-item"><i class="ph ph-phone"></i> DDD Cidades</a>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px dashed var(--input-border);">
          <label style="font-size: 11px; margin-bottom: 4px; display: block;">TEMA</label>
          <select id="theme-switcher" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 13px; cursor: pointer;">
            <option value="light">☀️ Claro (Padrão)</option>
            <option value="dark">🌙 Escuro</option>
            <option value="dracula">🧛 Dracula</option>
            <option value="neon">⚡ Neon</option>
          </select>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="mobile-header">
        <button class="mobile-toggle" id="open-sidebar"><i class="ph ph-list"></i></button>
        <span class="mobile-title">Busca Domínio</span>
      </header>
      
      <div class="content-wrapper">
        <!-- Main Container -->
        <main class="container">
      <header class="header">
        <div class="icon-wrapper">
          <i class="ph ph-globe"></i>
        </div>
        <h1>Busca Domínio</h1>
        <p>Consulte a situação e disponibilidade de domínios terminados em .br</p>
      </header>

      <div class="inputs-grid">
        <div class="group group-main">
          <label for="dominio">Domínio (ex: google.com.br)</label>
          <div class="input-content">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="dominio" placeholder="exemplo.com.br" autocomplete="off" />
            <div id="loading" class="spinner hidden"></div>
          </div>
          <span id="error-msg" class="error-msg hidden">Domínio não encontrado ou erro na busca.</span>
        </div>

        <div class="results-container hidden" id="results">
          <div class="group-row">
            <div class="group flex-2">
              <label for="fqdn">Domínio Consultado</label>
              <div class="input-content">
                <i class="ph ph-browser"></i>
                <input type="text" id="fqdn" readonly />
              </div>
            </div>
            <div class="group flex-1">
              <label for="status">Status</label>
              <div class="input-content">
                <i class="ph ph-shield-check"></i>
                <input type="text" id="status" readonly />
              </div>
            </div>
          </div>

          <div class="group-row">
            <div class="group flex-1">
              <label for="expires">Expira em</label>
              <div class="input-content">
                <i class="ph ph-calendar"></i>
                <input type="text" id="expires" readonly />
              </div>
            </div>
          </div>

          <div class="group">
            <label>Servidores DNS (Hosts)</label>
            <div class="chips-container" id="hosts">
              <!-- Chips inserted via JS -->
            </div>
          </div>

          <div class="group hidden" id="group-suggestions">
            <label>Sugestões Disponíveis</label>
            <div class="chips-container" id="suggestions">
              <!-- Chips inserted via JS -->
            </div>
          </div>

        </div>
      </div>
        </div>
      </div>
    </main>

    <script src="js/buscadominio.js"></script>
  </body>
</html>
