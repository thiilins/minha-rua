<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca CNPJ - Minha Rua</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Top Navigation Menu -->
    <nav class="top-nav">
      <a href="index.html" class="nav-link">
        <i class="ph ph-map-pin-line"></i> Busca CEP
      </a>
      <a href="cnpj.html" class="nav-link active">
        <i class="ph ph-buildings"></i> Busca CNPJ
      </a>
      <a href="dominio.html" class="nav-link">
        <i class="ph ph-globe"></i> Busca Domínio
      </a>
      <a href="cambio.html" class="nav-link">
        <i class="ph ph-currency-circle-dollar"></i> Câmbio
      </a>
    </nav>

    <main class="container">
      <header class="header">
        <div class="icon-wrapper">
          <i class="ph ph-buildings"></i>
        </div>
        <h1>Busca CNPJ</h1>
        <p>Acesse rapidamente os dados públicos de qualquer empresa brasileira.</p>
      </header>

      <div class="inputs-grid">
        <div class="group group-main">
          <label for="cnpj">CNPJ</label>
          <div class="input-content">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18" autocomplete="off" />
            <div id="loading" class="spinner hidden"></div>
          </div>
          <span id="error-msg" class="error-msg hidden">CNPJ não encontrado ou inválido.</span>
        </div>

        <div class="results-container hidden" id="results">
          <div class="group">
            <label for="razao_social">Razão Social</label>
            <div class="input-content">
              <i class="ph ph-briefcase"></i>
              <input type="text" id="razao_social" readonly />
            </div>
          </div>
          
          <div class="group-row">
            <div class="group flex-2">
              <label for="nome_fantasia">Nome Fantasia</label>
              <div class="input-content">
                <i class="ph ph-storefront"></i>
                <input type="text" id="nome_fantasia" readonly />
              </div>
            </div>
            <div class="group flex-1">
              <label for="situacao">Situação</label>
              <div class="input-content">
                <i class="ph ph-info"></i>
                <input type="text" id="situacao" readonly />
              </div>
            </div>
          </div>

          <div class="group">
            <label for="atividade">Atividade Principal (CNAE)</label>
            <div class="input-content">
              <i class="ph ph-list-dashes"></i>
              <input type="text" id="atividade" readonly />
            </div>
          </div>

          <div class="group-row">
            <div class="group flex-1">
              <label for="natureza">Natureza Jurídica</label>
              <div class="input-content">
                <i class="ph ph-scales"></i>
                <input type="text" id="natureza" readonly />
              </div>
            </div>
            <div class="group flex-1">
              <label for="telefone">Telefone</label>
              <div class="input-content">
                <i class="ph ph-phone"></i>
                <input type="text" id="telefone" readonly />
              </div>
            </div>
          </div>

          <div class="group">
            <label for="endereco">Endereço Completo</label>
            <div class="input-content">
              <i class="ph ph-map-pin"></i>
              <input type="text" id="endereco" readonly />
            </div>
          </div>

        </div>
      </div>
    </main>

    <script src="js/buscacnpj.js"></script>
  </body>
</html>
