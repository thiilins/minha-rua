<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca CNPJ - Minha Rua</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js" defer></script>
    <script src="js/sidebar.js" defer></script>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="ph ph-map-pin"></i>
          <span>Minha Rua</span>
        </div>
        <button class="sidebar-close" id="close-sidebar"><i class="ph ph-x"></i></button>
      </div>
                  <nav class="sidebar-nav">
        <label class="nav-label">Consultas</label>
        <a href="cep.html" class="nav-item"><i class="ph ph-map-pin-line"></i> Busca CEP</a>
        <a href="cnpj.html" class="nav-item active"><i class="ph ph-buildings"></i> Busca CNPJ</a>
        <a href="ddd.html" class="nav-item"><i class="ph ph-phone"></i> DDD Cidades</a>
        
        <label class="nav-label">Finanças</label>
        <a href="taxas.html" class="nav-item"><i class="ph ph-trend-up"></i> Taxas (Selic)</a>
        <a href="cambio.html" class="nav-item"><i class="ph ph-currency-circle-dollar"></i> Câmbio</a>
        <a href="pix.html" class="nav-item"><i class="ph ph-qr-code"></i> Bancos PIX</a>
        <a href="bancos.html" class="nav-item"><i class="ph ph-bank"></i> Cód. Bancos</a>
        
        <label class="nav-label">Serviços</label>
        <a href="index.html" class="nav-item"><i class="ph ph-cloud-sun"></i> Clima & Tempo</a>
        <a href="rastreio.html" class="nav-item"><i class="ph ph-package"></i> Rastreio</a>
        
        <label class="nav-label">Geral</label>
        <a href="ncm.html" class="nav-item"><i class="ph ph-barcode"></i> Busca NCM</a>
        <a href="feriados.html" class="nav-item"><i class="ph ph-calendar-blank"></i> Feriados</a>
        <a href="dominio.html" class="nav-item"><i class="ph ph-globe"></i> Domínios BR</a>
        <a href="isbn.html" class="nav-item"><i class="ph ph-book"></i> ISBN Livros</a>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px dashed var(--input-border);">
          <label style="font-size: 11px; margin-bottom: 4px; display: block;">TEMA</label>
          <select id="theme-switcher" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 13px; cursor: pointer;">
            <option value="light">☀️ Claro (Padrão)</option>
            <option value="dark">🌙 Escuro</option>
            <option value="dracula">🧛 Dracula</option>
            <option value="neon">⚡ Neon</option>
          </select>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="mobile-header">
        <button class="mobile-toggle" id="open-sidebar"><i class="ph ph-list"></i></button>
        <span class="mobile-title">Busca CNPJ</span>
      </header>
      
      <div class="content-wrapper">
        <!-- Main Container -->
        <main class="container">
          <header class="header">
            <div class="icon-wrapper">
              <i class="ph ph-buildings"></i>
            </div>
            <h1>Busca CNPJ</h1>
            <p>Acesse rapidamente os dados públicos de qualquer empresa brasileira.</p>
          </header>
      <div class="inputs-grid">
        <div class="group group-main">
          <label for="cnpj">CNPJ</label>
          <div class="input-content">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18" autocomplete="off" />
            <div id="loading" class="spinner-absolute hidden"></div>
          </div>
          <span id="error-msg" class="error-msg hidden">CNPJ não encontrado ou inválido.</span>
        </div>

        <div class="results-container hidden" id="results">
          <div class="group">
            <label for="razao_social">Razão Social</label>
            <div class="input-content">
              <i class="ph ph-briefcase"></i>
              <input type="text" id="razao_social" readonly />
            </div>
          </div>
          
          <div class="group-row">
            <div class="group flex-2">
              <label for="nome_fantasia">Nome Fantasia</label>
              <div class="input-content">
                <i class="ph ph-storefront"></i>
                <input type="text" id="nome_fantasia" readonly />
              </div>
            </div>
            <div class="group flex-1">
              <label for="situacao">Situação</label>
              <div class="input-content">
                <i class="ph ph-info"></i>
                <input type="text" id="situacao" readonly />
              </div>
            </div>
          </div>

          <div class="group">
            <label for="atividade">Atividade Principal (CNAE)</label>
            <div class="input-content">
              <i class="ph ph-list-dashes"></i>
              <input type="text" id="atividade" readonly />
            </div>
          </div>

          <div class="group-row">
            <div class="group flex-1">
              <label for="natureza">Natureza Jurídica</label>
              <div class="input-content">
                <i class="ph ph-scales"></i>
                <input type="text" id="natureza" readonly />
              </div>
            </div>
            <div class="group flex-1">
              <label for="telefone">Telefone</label>
              <div class="input-content">
                <i class="ph ph-phone"></i>
                <input type="text" id="telefone" readonly />
              </div>
            </div>
          </div>

          <div class="group">
            <label for="endereco">Endereço Completo</label>
            <div class="input-content">
              <i class="ph ph-map-pin"></i>
              <input type="text" id="endereco" readonly />
            </div>
          </div>

        </div>
      </div>
        </div>
      </div>
    </main>

    <script src="js/buscacnpj.js"></script>
  </body>
</html>
