<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taxas Econômicas - Minha Rua</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
    <style>
      .taxa-card {
        background: var(--white-bg);
        border: 1px solid var(--input-border);
        border-radius: 24px;
        padding: 32px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      }
      .taxa-card:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        border-color: var(--primary);
      }
      .taxa-icon {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        background: var(--input-bg);
        color: var(--primary);
        font-size: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
      }
      .taxa-name {
        font-size: 18px;
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .taxa-value {
        font-size: 42px;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: -1px;
      }
      .taxa-value span {
        font-size: 24px;
        color: var(--text-muted);
        font-weight: 600;
        margin-left: 4px;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="ph-fill ph-map-pin"></i>
          <span>MinhaRua</span>
        </div>
        <button class="sidebar-close" id="close-sidebar">
          <i class="ph ph-x"></i>
        </button>
      </div>
      
            <nav class="sidebar-nav">
        <label class="nav-label">Consultas</label>
        <a href="index.html" class="nav-item"><i class="ph ph-map-pin-line"></i> Busca CEP</a>
        <a href="cnpj.html" class="nav-item"><i class="ph ph-buildings"></i> Busca CNPJ</a>
        <a href="ddd.html" class="nav-item"><i class="ph ph-phone"></i> DDD Cidades</a>
        
        <label class="nav-label">Finanças</label>
        <a href="taxas.html" class="nav-item active"><i class="ph ph-trend-up"></i> Taxas (Selic)</a>
        <a href="cambio.html" class="nav-item"><i class="ph ph-currency-circle-dollar"></i> Câmbio</a>
        <a href="pix.html" class="nav-item"><i class="ph ph-qr-code"></i> Bancos PIX</a>
        <a href="bancos.html" class="nav-item"><i class="ph ph-bank"></i> Cód. Bancos</a>
        
        <label class="nav-label">Serviços</label>
        <a href="clima.html" class="nav-item"><i class="ph ph-cloud-sun"></i> Clima & Tempo</a>
        <a href="rastreio.html" class="nav-item"><i class="ph ph-package"></i> Rastreio</a>
        
        <label class="nav-label">Geral</label>
        <a href="ncm.html" class="nav-item"><i class="ph ph-barcode"></i> Busca NCM</a>
        <a href="feriados.html" class="nav-item"><i class="ph ph-calendar-blank"></i> Feriados</a>
        <a href="dominio.html" class="nav-item"><i class="ph ph-globe"></i> Domínios BR</a>
        <a href="isbn.html" class="nav-item"><i class="ph ph-book"></i> ISBN Livros</a>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px dashed var(--input-border);">
          <label style="font-size: 11px; margin-bottom: 4px; display: block; color: var(--text-muted); font-weight: 700;">TEMA</label>
          <select id="theme-switcher" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 13px; cursor: pointer;">
            <option value="light">☀️ Claro (Padrão)</option>
            <option value="dark">🌙 Escuro</option>
            <option value="dracula">🧛 Dracula</option>
            <option value="neon">⚡ Neon</option>
          </select>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="mobile-header">
        <button class="mobile-toggle" id="open-sidebar"><i class="ph ph-list"></i></button>
        <span class="mobile-title">Taxas Econômicas</span>
      </header>
      
      <div class="content-wrapper">
        <!-- Main Container -->
        <main class="container">
          <header class="header">
            <div class="icon-wrapper">
              <i class="ph ph-trend-up"></i>
            </div>
            <h1>Indicadores Econômicos</h1>
            <p>Principais taxas de juros e inflação do mercado financeiro atualizadas hoje.</p>
          </header>

          <div class="inputs-grid">
            <!-- Loading -->
            <div id="loading" style="display: flex; justify-content: center; margin: 40px 0;">
              <div class="spinner"></div>
            </div>
            
            <div id="error-msg" class="error-msg hidden" style="text-align: center; font-size: 16px;"></div>

            <!-- Taxas Grid -->
            <div class="dashboard-grid hidden" id="taxas-grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px;">
              <!-- Cards injeados pelo JS -->
            </div>
          </div>
        </main>
      </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/buscataxas.js"></script>
  </body>
</html>
