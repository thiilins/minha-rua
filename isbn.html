<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISBN Livros - Minha Rua</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js" defer></script>
    <script src="js/sidebar.js" defer></script>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="ph ph-map-pin"></i>
          <span>Minha Rua</span>
        </div>
        <button class="sidebar-close" id="close-sidebar"><i class="ph ph-x"></i></button>
      </div>
            <nav class="sidebar-nav">
        <label class="nav-label">Consultas</label>
        <a href="index.html" class="nav-item"><i class="ph ph-map-pin-line"></i> Busca CEP</a>
        <a href="cnpj.html" class="nav-item"><i class="ph ph-buildings"></i> Busca CNPJ</a>
        <a href="ddd.html" class="nav-item"><i class="ph ph-phone"></i> DDD Cidades</a>
        
        <label class="nav-label">Finanças</label>
        <a href="taxas.html" class="nav-item"><i class="ph ph-trend-up"></i> Taxas (Selic)</a>
        <a href="cambio.html" class="nav-item"><i class="ph ph-currency-circle-dollar"></i> Câmbio</a>
        <a href="pix.html" class="nav-item"><i class="ph ph-qr-code"></i> Bancos PIX</a>
        <a href="bancos.html" class="nav-item"><i class="ph ph-bank"></i> Cód. Bancos</a>
        
        <label class="nav-label">Serviços</label>
        <a href="clima.html" class="nav-item"><i class="ph ph-cloud-sun"></i> Clima & Tempo</a>
        <a href="rastreio.html" class="nav-item"><i class="ph ph-package"></i> Rastreio</a>
        
        <label class="nav-label">Geral</label>
        <a href="ncm.html" class="nav-item"><i class="ph ph-barcode"></i> Busca NCM</a>
        <a href="feriados.html" class="nav-item"><i class="ph ph-calendar-blank"></i> Feriados</a>
        <a href="dominio.html" class="nav-item"><i class="ph ph-globe"></i> Domínios BR</a>
        <a href="isbn.html" class="nav-item active"><i class="ph ph-book"></i> ISBN Livros</a>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px dashed var(--input-border);">
          <label style="font-size: 11px; margin-bottom: 4px; display: block;">TEMA</label>
          <select id="theme-switcher" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 13px; cursor: pointer;">
            <option value="light">☀️ Claro (Padrão)</option>
            <option value="dark">🌙 Escuro</option>
            <option value="dracula">🧛 Dracula</option>
            <option value="neon">⚡ Neon</option>
          </select>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="mobile-header">
        <button class="mobile-toggle" id="open-sidebar"><i class="ph ph-list"></i></button>
        <span class="mobile-title">ISBN Livros</span>
      </header>
      
      <div class="content-wrapper">
        <main class="container">
          <header class="header">
            <div class="icon-wrapper">
              <i class="ph ph-book"></i>
            </div>
            <h1>Busca de Livros</h1>
            <p>Descubra detalhes bibliográficos e sinopse informando o código ISBN.</p>
          </header>

          <div class="inputs-grid">
            <div class="group group-main">
              <label for="isbn">Código ISBN</label>
              <div class="input-content">
                <i class="ph ph-barcode"></i>
                <input type="text" id="isbn" placeholder="Ex: 9788545702870" autocomplete="off" />
              </div>
              <span id="error-msg" class="error-msg hidden">ISBN não encontrado.</span>
            </div>

            <!-- Loading -->
            <div style="position: relative; display: flex; justify-content: center; height: 24px; margin-top: -10px;">
              <div id="loading" class="spinner hidden" style="position: relative; right: auto;"></div>
            </div>

            <div class="results-container hidden" id="results">
              <div class="group-row">
                <div class="group flex-1" id="book-cover-container" style="display: none; align-items: center; justify-content: center;">
                  <img id="book-cover" src="" alt="Capa do Livro" style="max-width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);" />
                </div>
                <div class="group flex-2" style="gap: 16px;">
                  <div class="group">
                    <label>Título e Autores</label>
                    <div style="font-size: 24px; font-weight: 800; color: var(--primary);" id="book-title"></div>
                    <div style="font-size: 15px; color: var(--text-muted); font-weight: 600;" id="book-authors"></div>
                  </div>
                  
                  <div class="group-row">
                    <div class="group flex-1">
                      <label>Editora</label>
                      <div class="input-content"><i class="ph ph-printer"></i><input type="text" id="book-publisher" readonly /></div>
                    </div>
                    <div class="group flex-1">
                      <label>Ano de Publicação</label>
                      <div class="input-content"><i class="ph ph-calendar"></i><input type="text" id="book-year" readonly /></div>
                    </div>
                  </div>

                  <div class="group">
                    <label>Páginas e Formato</label>
                    <div class="input-content"><i class="ph ph-file-text"></i><input type="text" id="book-format" readonly /></div>
                  </div>
                  
                  <div class="group">
                    <label>Assuntos</label>
                    <div class="chips-container" id="book-subjects" style="min-height: auto;"></div>
                  </div>
                </div>
              </div>

              <div class="group" style="margin-top: 10px;">
                <label>Sinopse</label>
                <div style="padding: 20px; background: var(--input-bg); border-radius: 16px; border: 1px solid var(--input-border); color: var(--text-main); font-size: 15px; line-height: 1.6;" id="book-synopsis"></div>
              </div>

            </div>
          </div>
        </main>
      </div>
    </main>

    <script src="js/buscaisbn.js"></script>
  </body>
</html>
