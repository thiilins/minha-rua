<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca NCM - Minha Rua</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
    <style>
      .ncm-card {
        background: var(--white-bg);
        border: 1px solid var(--input-border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: transform 0.2s;
      }
      .ncm-card:hover {
        transform: translateY(-2px);
        border-color: var(--primary);
      }
      .ncm-code {
        font-size: 24px;
        font-weight: 800;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ncm-desc {
        font-size: 16px;
        font-weight: 500;
        color: var(--text-main);
        line-height: 1.5;
      }
      .ncm-dates {
        margin-top: 8px;
        font-size: 13px;
        color: var(--text-muted);
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .ncm-dates span {
        display: flex;
        align-items: center;
        gap: 4px;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="ph-fill ph-map-pin"></i>
          <span>MinhaRua</span>
        </div>
        <button class="sidebar-close" id="close-sidebar">
          <i class="ph ph-x"></i>
        </button>
      </div>
      
            <nav class="sidebar-nav">
        <label class="nav-label">Consultas</label>
        <a href="index.html" class="nav-item"><i class="ph ph-map-pin-line"></i> Busca CEP</a>
        <a href="cnpj.html" class="nav-item"><i class="ph ph-buildings"></i> Busca CNPJ</a>
        <a href="ddd.html" class="nav-item"><i class="ph ph-phone"></i> DDD Cidades</a>
        
        <label class="nav-label">Finanças</label>
        <a href="taxas.html" class="nav-item"><i class="ph ph-trend-up"></i> Taxas (Selic)</a>
        <a href="cambio.html" class="nav-item"><i class="ph ph-currency-circle-dollar"></i> Câmbio</a>
        <a href="pix.html" class="nav-item"><i class="ph ph-qr-code"></i> Bancos PIX</a>
        <a href="bancos.html" class="nav-item"><i class="ph ph-bank"></i> Cód. Bancos</a>
        
        <label class="nav-label">Serviços</label>
        <a href="clima.html" class="nav-item"><i class="ph ph-cloud-sun"></i> Clima & Tempo</a>
        <a href="rastreio.html" class="nav-item"><i class="ph ph-package"></i> Rastreio</a>
        
        <label class="nav-label">Geral</label>
        <a href="ncm.html" class="nav-item active"><i class="ph ph-barcode"></i> Busca NCM</a>
        <a href="feriados.html" class="nav-item"><i class="ph ph-calendar-blank"></i> Feriados</a>
        <a href="dominio.html" class="nav-item"><i class="ph ph-globe"></i> Domínios BR</a>
        <a href="isbn.html" class="nav-item"><i class="ph ph-book"></i> ISBN Livros</a>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px dashed var(--input-border);">
          <label style="font-size: 11px; margin-bottom: 4px; display: block; color: var(--text-muted); font-weight: 700;">TEMA</label>
          <select id="theme-switcher" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 13px; cursor: pointer;">
            <option value="light">☀️ Claro (Padrão)</option>
            <option value="dark">🌙 Escuro</option>
            <option value="dracula">🧛 Dracula</option>
            <option value="neon">⚡ Neon</option>
          </select>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="mobile-header">
        <button class="mobile-toggle" id="open-sidebar"><i class="ph ph-list"></i></button>
        <span class="mobile-title">Busca NCM</span>
      </header>
      
      <div class="content-wrapper">
        <main class="container">
          <header class="header">
            <div class="icon-wrapper">
              <i class="ph ph-barcode"></i>
            </div>
            <h1>Consulta NCM</h1>
            <p>Encontre a Nomenclatura Comum do Mercosul para notas fiscais.</p>
          </header>

          <div class="inputs-grid">
            <div class="group group-main">
              <label for="search-ncm">Código ou Descrição (Ex: Computador)</label>
              <div class="input-content" style="display: flex;">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="search-ncm" placeholder="Digite o NCM ou produto..." autocomplete="off" />
                <button id="btn-buscar" style="background: var(--primary); color: white; border: none; padding: 0 24px; border-radius: 12px; font-weight: 700; cursor: pointer; margin: 6px 0;">Buscar</button>
              </div>
              <div id="loading" class="spinner hidden" style="margin: 16px auto;"></div>
              <span id="error-msg" class="error-msg hidden"></span>
            </div>

            <!-- Results -->
            <div id="results" class="hidden">
              <label style="display: block; text-align: center; margin-bottom: 16px; font-weight: 600; color: var(--text-muted);" id="count-label"></label>
              <div class="dashboard-grid" id="ncm-grid" style="grid-template-columns: 1fr;">
                <!-- Cards injetados aqui -->
              </div>
            </div>
          </div>
        </main>
      </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/buscancm.js"></script>
  </body>
</html>
