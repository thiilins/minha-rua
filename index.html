<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca CEP - Minha Rua</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Top Navigation Menu -->
    <nav class="top-nav">
      <a href="index.html" class="nav-link active">
        <i class="ph ph-map-pin-line"></i> Busca CEP
      </a>
      <a href="cnpj.html" class="nav-link">
        <i class="ph ph-buildings"></i> Busca CNPJ
      </a>
      <a href="dominio.html" class="nav-link">
        <i class="ph ph-globe"></i> Busca Domínio
      </a>
      <a href="cambio.html" class="nav-link">
        <i class="ph ph-currency-circle-dollar"></i> Câmbio
      </a>
    </nav>

    <main class="container">
      <header class="header">
        <div class="icon-wrapper">
          <i class="ph ph-map-pin-line"></i>
        </div>
        <h1>Busca CEP</h1>
        <p>Encontre o endereço de qualquer lugar no Brasil, de forma rápida e simples.</p>
      </header>

      <div class="inputs-grid">
        <div class="group group-main">
          <label for="cep">CEP</label>
          <div class="input-content">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="cep" placeholder="00000-000" maxlength="9" autocomplete="off" />
            <div id="loading" class="spinner hidden"></div>
          </div>
          <span id="error-msg" class="error-msg hidden">CEP não encontrado.</span>
        </div>

        <div class="results-container hidden" id="results">
          <div class="group">
            <label for="rua">Logradouro (Rua)</label>
            <div class="input-content">
              <i class="ph ph-road-horizon"></i>
              <input type="text" id="rua" readonly />
            </div>
          </div>
          <div class="group">
            <label for="bairro">Bairro</label>
            <div class="input-content">
              <i class="ph ph-map-trifold"></i>
              <input type="text" id="bairro" readonly />
            </div>
          </div>
          <div class="group-row">
            <div class="group flex-2">
              <label for="cidade">Cidade</label>
              <div class="input-content">
                <i class="ph ph-city"></i>
                <input type="text" id="cidade" readonly />
              </div>
            </div>
            <div class="group flex-1">
              <label for="UF">UF</label>
              <div class="input-content">
                <i class="ph ph-flag"></i>
                <input type="text" id="UF" readonly />
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/buscacep.js"></script>
  </body>
</html>
