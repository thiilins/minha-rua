<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clima e Tempo - Minha Rua</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
    <style>
      .weather-container {
        display: flex;
        flex-direction: column;
        gap: 24px;
        margin-top: 24px;
      }
      /* Today Card */
      .weather-today {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 32px;
        padding: 40px;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow: 0 15px 35px rgba(255, 107, 107, 0.25);
        position: relative;
        overflow: hidden;
      }
      .weather-today::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/></svg>');
        background-size: 150px;
        opacity: 0.5;
        z-index: 0;
      }
      .weather-today > * {
        position: relative;
        z-index: 1;
      }
      .city-name {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .weather-date {
        font-size: 16px;
        font-weight: 500;
        opacity: 0.9;
        margin-bottom: 24px;
      }
      .weather-main {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 32px;
      }
      .weather-icon-huge {
        font-size: 80px;
        line-height: 1;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
      }
      .weather-temp-huge {
        font-size: 72px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -2px;
        display: flex;
        align-items: flex-start;
      }
      .weather-temp-huge span {
        font-size: 32px;
        font-weight: 600;
        margin-top: 8px;
        opacity: 0.9;
      }
      .weather-desc {
        font-size: 20px;
        font-weight: 600;
        background: rgba(0,0,0,0.15);
        padding: 8px 24px;
        border-radius: 20px;
        backdrop-filter: blur(5px);
        margin-bottom: 32px;
      }
      .weather-details {
        display: flex;
        gap: 32px;
        background: rgba(255,255,255,0.2);
        padding: 16px 32px;
        border-radius: 24px;
        backdrop-filter: blur(10px);
      }
      .w-detail {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .w-detail i { font-size: 24px; opacity: 0.9; }
      .w-detail span { font-size: 14px; font-weight: 500; opacity: 0.9; }
      .w-detail strong { font-size: 18px; font-weight: 700; }

      /* Forecast Grid */
      .forecast-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 16px;
      }
      .forecast-card {
        background: var(--white-bg);
        border: 1px solid var(--input-border);
        border-radius: 24px;
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        transition: transform 0.2s;
      }
      .forecast-card:hover {
        transform: translateY(-4px);
        border-color: var(--primary);
      }
      .f-date {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .f-icon {
        font-size: 40px;
        color: var(--primary);
        margin-bottom: 16px;
      }
      .f-temps {
        display: flex;
        gap: 12px;
      }
      .f-min {
        color: #48dbfb;
        font-weight: 700;
        font-size: 16px;
      }
      .f-max {
        color: #ff6b6b;
        font-weight: 700;
        font-size: 16px;
      }
    </style>
  </head>
  <body>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="ph-fill ph-map-pin"></i>
          <span>MinhaRua</span>
        </div>
        <button class="sidebar-close" id="close-sidebar">
          <i class="ph ph-x"></i>
        </button>
      </div>
      
                  <nav class="sidebar-nav">
        <label class="nav-label">Consultas</label>

        <a href="taxas.html" class="nav-item"><i class="ph ph-trend-up"></i> Taxas (Selic)</a>
        <a href="cambio.html" class="nav-item"><i class="ph ph-currency-circle-dollar"></i> Câmbio</a>
        <a href="pix.html" class="nav-item"><i class="ph ph-qr-code"></i> Bancos PIX</a>
        <a href="bancos.html" class="nav-item"><i class="ph ph-bank"></i> Cód. Bancos</a>

        <a href="rastreio.html" class="nav-item"><i class="ph ph-package"></i> Rastreio</a>

        <div style="margin-top: auto; padding-top: 20px; border-top: 1px dashed var(--input-border);">
          <label style="font-size: 11px; margin-bottom: 4px; display: block; color: var(--text-muted); font-weight: 700;">TEMA</label>
          <select id="theme-switcher" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 13px; cursor: pointer;">
            <option value="light">☀️ Claro (Padrão)</option>
            <option value="dark">🌙 Escuro</option>
            <option value="dracula">🧛 Dracula</option>
            <option value="neon">⚡ Neon</option>
          </select>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="mobile-header">
        <button class="mobile-toggle" id="open-sidebar"><i class="ph ph-list"></i></button>
        <span class="mobile-title">Clima & Tempo</span>
      </header>
      
      <div class="content-wrapper">
        <main class="container">
          <header class="header">
            <div class="icon-wrapper">
              <i class="ph ph-cloud-sun"></i>
            </div>
            <h1>Previsão do Tempo</h1>
            <p>Busque pela sua cidade e veja a previsão do CPTEC para os próximos dias.</p>
          </header>

          <div class="inputs-grid">
            <div class="group group-main">
              <label for="cidade">Nome da Cidade</label>
              <div style="display: flex; gap: 12px; align-items: stretch; width: 100%;">
                <div class="input-content" style="flex: 1; margin: 0; padding-right: 8px;">
                  <i class="ph ph-map-pin"></i>
                  <input type="text" id="cidade" placeholder="Ex: Florianópolis" autocomplete="off" />
                  <button id="btn-gps" title="Usar minha localização" style="background: none; border: none; color: var(--primary); cursor: pointer; padding: 8px; font-size: 22px; display: flex; align-items: center; border-radius: 8px; transition: background 0.2s;">
                    <i class="ph ph-crosshair"></i>
                  </button>
                </div>
                <button id="btn-buscar" style="background: var(--primary); color: white; border: none; padding: 0 32px; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);">Buscar</button>
              </div>
              <div id="loading" class="spinner hidden" style="margin: 16px auto;"></div>
              <span id="error-msg" class="error-msg hidden"></span>
            </div>

            <!-- List of cities if multiple are found -->
            <div id="city-selector" class="hidden" style="text-align: center;">
              <label style="margin-bottom: 8px; display: block;">Múltiplas cidades encontradas. Qual estado?</label>
              <div class="chips-container" id="city-chips" style="justify-content: center;">
              </div>
            </div>

            <!-- Weather Results -->
            <div id="weather-results" class="weather-container hidden">
              <!-- Injetado pelo JS -->
            </div>
          </div>
        </main>
      </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/buscaclima.js"></script>
  </body>
</html>
